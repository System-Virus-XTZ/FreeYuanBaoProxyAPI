<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeYuanBaoProxyAPI | 大模型中转站管理平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-white: #ffffff;
            --light-blue: #e8f4ff;
            --dark-blue: #1890ff;
            --black: #333333;
            --green: #52c41a;
            --red: #ff4d4f;
            --light-gray: #f5f5f5;
            --border-color: #e8e8e8;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body { background-color: var(--light-blue); color: var(--black); line-height: 1.6; }
        .container { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background-color: var(--primary-white); box-shadow: var(--shadow); display: flex; flex-direction: column; z-index: 100; }
        .logo { padding: 24px 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--dark-blue), #69c0ff); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
        .logo-text { font-size: 20px; font-weight: 700; }
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item { padding: 14px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.3s; color: var(--black); text-decoration: none; border-left: 3px solid transparent; }
        .nav-item:hover { background-color: var(--light-blue); color: var(--dark-blue); }
        .nav-item.active { background-color: var(--light-blue); color: var(--dark-blue); border-left: 3px solid var(--dark-blue); }
        .nav-item i { width: 20px; text-align: center; }
        .user-profile { padding: 20px; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--dark-blue), #69c0ff); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .main-content { flex: 1; padding: 24px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; font-weight: 700; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background-color: var(--dark-blue); color: white; }
        .btn-primary:hover { background-color: #40a9ff; }
        .btn-success { background-color: var(--green); color: white; }
        .btn-success:hover { background-color: #73d13d; }
        .btn-danger { background-color: var(--red); color: white; }
        .btn-danger:hover { background-color: #ff7875; }
        .content-card { background-color: var(--primary-white); border-radius: 12px; box-shadow: var(--shadow); padding: 24px; margin-bottom: 24px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        .card-header h2 { font-size: 20px; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-col { flex: 1; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; transition: border-color 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--dark-blue); }
        .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--black); }
        .btn-outline:hover { background-color: var(--light-gray); }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .empty-state { text-align: center; padding: 40px 20px; color: #888; }
        .empty-state i { font-size: 48px; margin-bottom: 16px; color: #d9d9d9; }
        .model-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .model-card { background: var(--primary-white); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
        .model-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .model-name { font-size: 18px; font-weight: 600; }
        .model-status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .model-status.active { background-color: rgba(82, 196, 26, 0.1); color: var(--green); }
        .model-status.inactive { background-color: rgba(255, 77, 79, 0.1); color: var(--red); }
        .model-info { margin-bottom: 16px; }
        .model-info p { font-size: 13px; color: #666; margin-bottom: 4px; word-break: break-all; }
        .model-keys { margin: 16px 0; }
        .key-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--light-gray); border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
        .key-preview { font-family: monospace; color: #666; }
        .toggle-switch { position: relative; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 24px; }
        .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: var(--green); }
        input:checked + .toggle-slider:before { transform: translateX(20px); }
        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
        .alert-success { background-color: rgba(82, 196, 26, 0.1); border: 1px solid var(--green); color: var(--green); }
        .alert-error { background-color: rgba(255, 77, 79, 0.1); border: 1px solid var(--red); color: var(--red); }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: var(--light-gray); font-weight: 600; }
        tr:hover { background-color: var(--light-blue); }
        .btn-sm { padding: 4px 8px; font-size: 12px; }
        textarea { min-height: 100px; resize: vertical; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, var(--light-blue), #fff); }
        .login-box { background: var(--primary-white); padding: 40px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .login-box h1 { text-align: center; margin-bottom: 30px; color: var(--dark-blue); }
        .login-box .btn { width: 100%; justify-content: center; padding: 12px; font-size: 16px; }
        .nav-badge { background: var(--red); color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; margin-left: auto; }
        .setting-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .setting-section:last-child { border-bottom: none; }
        .setting-section h3 { margin-bottom: 16px; color: var(--dark-blue); display: flex; align-items: center; gap: 8px; }
        .model-config-item { background: var(--light-gray); padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        .model-config-item h4 { margin-bottom: 12px; color: var(--black); }
        .delete-model { color: var(--red); cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-page" class="login-container" style="display: none;">
        <div class="login-box">
            <h1><i class="fas fa-brain"></i> FreeYuanBaoProxyAPI 管理平台</h1>
            <div id="login-alert" class="alert alert-error" style="display: none;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>管理密码</label>
                    <input type="password" id="login-password" placeholder="请输入管理密码" required>
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="container" style="display: none;">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-brain"></i></div>
                <div class="logo-text">FreeYuanBaoProxyAPI</div>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-item active" data-target="dashboard">
                    <i class="fas fa-chart-line"></i> 仪表盘
                </a>
                <a href="#" class="nav-item" data-target="models">
                    <i class="fas fa-robot"></i> 模型管理
                </a>
                <a href="#" class="nav-item" data-target="settings">
                    <i class="fas fa-cog"></i> 系统设置
                </a>
                <a href="#" class="nav-item" data-target="keys">
                    <i class="fas fa-key"></i> API Keys
                </a>
                <a href="#" class="nav-item" data-target="logs">
                    <i class="fas fa-history"></i> 使用日志
                </a>
            </div>
            <div class="user-profile">
                <div class="user-avatar">A</div>
                <div><h4>管理员</h4><p style="font-size:12px;color:#888;">在线</p></div>
                <a href="/logout" class="btn btn-sm btn-outline" style="margin-left: auto;"><i class="fas fa-sign-out-alt"></i></a>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="main-content">
            <!-- 仪表盘 -->
            <section id="dashboard" class="content-section active">
                <div class="header">
                    <h1>仪表盘</h1>
                    <button class="btn btn-primary" onclick="loadStatus()"><i class="fas fa-sync"></i> 刷新</button>
                </div>
                <div id="status-alert"></div>
                <div id="dashboard-stats" class="model-grid"></div>
                <div class="content-card">
                    <div class="card-header"><h2>模型状态</h2></div>
                    <div id="models-status"></div>
                </div>
            </section>

            <!-- 模型管理 -->
            <section id="models" class="content-section">
                <div class="header">
                    <h1>模型管理</h1>
                    <button class="btn btn-primary" onclick="showAddModelForm()"><i class="fas fa-plus"></i> 添加模型</button>
                </div>
                <div id="models-alert"></div>
                <div id="add-model-form" class="content-card" style="display: none;">
                    <h3>添加新模型</h3>
                    <form id="model-form">
                        <div class="form-row">
                            <div class="form-col">
                                <div class="form-group">
                                    <label>模型名称</label>
                                    <input type="text" id="model-name" placeholder="例如：Qwen-72B" required>
                                </div>
                            </div>
                            <div class="form-col">
                                <div class="form-group">
                                    <label>Base URL</label>
                                    <input type="url" id="model-base-url" placeholder="https://api.example.com/v1" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>API Keys (每行一个)</label>
                            <textarea id="model-keys" placeholder="sk-key1&#10;sk-key2&#10;sk-key3" required></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-outline" onclick="hideAddModelForm()">取消</button>
                            <button type="submit" class="btn btn-primary">保存模型</button>
                        </div>
                    </form>
                </div>
                <div id="models-list" class="model-grid"></div>
            </section>

            <!-- 系统设置 -->
            <section id="settings" class="content-section">
                <div class="header"><h1>系统设置</h1></div>
                <div id="settings-alert"></div>
                <form id="settings-form">
                    <div class="content-card">
                        <div class="setting-section">
                            <h3><i class="fas fa-lock"></i> 安全设置</h3>
                            <div class="form-row">
                                <div class="form-col">
                                    <div class="form-group">
                                        <label>管理密码</label>
                                        <input type="password" id="admin-password" placeholder="留空则不修改">
                                    </div>
                                </div>
                                <div class="form-col">
                                    <div class="form-group">
                                        <label>确认密码</label>
                                        <input type="password" id="admin-password-confirm" placeholder="确认新密码">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="setting-section">
                            <h3><i class="fas fa-robot"></i> 元宝Bot配置</h3>
                            <div class="form-row">
                                <div class="form-col">
                                    <div class="form-group">
                                        <label>APP_ID</label>
                                        <input type="text" id="app-id">
                                    </div>
                                </div>
                                <div class="form-col">
                                    <div class="form-group">
                                        <label>APP_SECRET</label>
                                        <input type="password" id="app-secret">
                                    </div>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-col">
                                    <div class="form-group">
                                        <label>群号 (GROUP_CODE)</label>
                                        <input type="text" id="group-code">
                                    </div>
                                </div>
                                <div class="form-col">
                                    <div class="form-group">
                                        <label>用户ID (YUANBAO_USER_ID)</label>
                                        <input type="text" id="yuanbao-user-id">
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>机器人昵称</label>
                                <input type="text" id="yuanbao-nick">
                            </div>
                        </div>
                        <div class="setting-section">
                            <h3><i class="fas fa-server"></i> 服务配置</h3>
                            <div class="form-row">
                                <div class="form-col">
                                    <div class="form-group">
                                        <label>服务端口</label>
                                        <input type="number" id="port" min="1" max="65535">
                                    </div>
                                </div>
                                <div class="form-col">
                                    <div class="form-group">
                                        <label>调试模式</label>
                                        <select id="debug">
                                            <option value="false">关闭</option>
                                            <option value="true">开启</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="setting-section">
                            <h3><i class="fas fa-key"></i> 对外API Keys (多个key会自动轮询)</h3>
                            <div class="form-group">
                                <label>API Keys (每行一个)</label>
                                <textarea id="default-keys" placeholder="sk-key1&#10;sk-key2"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> 保存设置</button>
                    </div>
                </form>
            </section>

            <!-- API Keys -->
            <section id="keys" class="content-section">
                <div class="header">
                    <h1>API Keys</h1>
                </div>
                <div class="content-card">
                    <div class="card-header"><h2>用户API Keys</h2></div>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Key</th><th>模型权限</th><th>状态</th><th>创建时间</th></tr></thead>
                            <tbody id="api-keys-list"><tr><td colspan="4" class="empty-state">暂无数据</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- 使用日志 -->
            <section id="logs" class="content-section">
                <div class="header">
                    <h1>使用日志</h1>
                    <button class="btn btn-primary" onclick="loadLogs()"><i class="fas fa-sync"></i> 刷新</button>
                </div>
                <div class="content-card">
                    <div class="table-container">
                        <table>
                            <thead><tr><th>时间</th><th>Key</th><th>模型</th><th>Tokens</th><th>状态</th></tr></thead>
                            <tbody id="logs-list"><tr><td colspan="5" class="empty-state">暂无数据</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // 检查登录状态
        async function checkAuth() {
            try {
                const r = await fetch('/');
                if (r.redirected && r.url.includes('login')) {
                    showLoginPage();
                } else {
                    showMainApp();
                    loadAll();
                }
            } catch(e) {
                showLoginPage();
            }
        }

        function showLoginPage() {
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }

        function showMainApp() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }

        // 登录
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const pwd = document.getElementById('login-password').value;
            const fd = new FormData();
            fd.append('password', pwd);
            try {
                const r = await fetch('/login', { method: 'POST', body: fd });
                const data = await r.json();
                if (data.success) {
                    window.location.href = data.redirect || '/';
                } else {
                    document.getElementById('login-alert').textContent = data.error || '密码错误';
                    document.getElementById('login-alert').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('login-alert').textContent = '登录失败';
                document.getElementById('login-alert').style.display = 'block';
            }
        };

        // 导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(item.dataset.target).classList.add('active');
            };
        });

        // 加载所有数据
        async function loadAll() {
            await loadConfig();
            await loadStatus();
        }

        // 加载配置
        async function loadConfig() {
            try {
                const r = await fetch('/api/config');
                if (!r.ok) return;
                const cfg = await r.json();
                
                document.getElementById('app-id').value = cfg.app_id || '';
                document.getElementById('app-secret').value = cfg.app_secret || '';
                document.getElementById('group-code').value = cfg.group_code || '';
                document.getElementById('yuanbao-user-id').value = cfg.yuanbao_user_id || '';
                document.getElementById('yuanbao-nick').value = cfg.yuanbao_nick || '';
                document.getElementById('port').value = cfg.port || 8000;
                document.getElementById('debug').value = String(cfg.debug || false);
                
                const defaultKeys = cfg.default_keys || [];
                document.getElementById('default-keys').value = defaultKeys.join('\n');
                
                // 加载模型
                renderModels(cfg.models || []);
            } catch(e) { console.error('loadConfig error:', e); }
        }

        // 加载状态
        async function loadStatus() {
            try {
                const r = await fetch('/api/status');
                if (!r.ok) return;
                const data = await r.json();
                
                const stats = document.getElementById('dashboard-stats');
                stats.innerHTML = `
                    <div class="model-card"><h3>总请求</h3><p style="font-size:32px;font-weight:bold;">${data.total_requests || 0}</p></div>
                    <div class="model-card"><h3>总Keys</h3><p style="font-size:32px;font-weight:bold;">${data.models?.total_keys || 0}</p></div>
                    <div class="model-card"><h3>运行时间</h3><p style="font-size:32px;font-weight:bold;">${formatUptime(data.uptime)}</p></div>
                `;
                
                const modelsStatus = document.getElementById('models-status');
                if (data.models?.upstream?.length) {
                    modelsStatus.innerHTML = data.models.upstream.map((m, i) => 
                        `<div style="padding:12px;border-bottom:1px solid #eee;"><b>${m}</b> - 已配置</div>`
                    ).join('');
                }
            } catch(e) { console.error('loadStatus error:', e); }
        }

        // 渲染模型列表
        function renderModels(models) {
            const container = document.getElementById('models-list');
            if (!models.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-robot"></i><p>暂无模型，请添加</p></div>';
                return;
            }
            container.innerHTML = models.map((m, idx) => `
                <div class="model-card">
                    <div class="model-card-header">
                        <span class="model-name">${m.name}</span>
                        <span class="model-status active">${m.api_keys?.length || 0} Keys</span>
                    </div>
                    <div class="model-info">
                        <p><b>Base URL:</b> ${m.base_url}</p>
                    </div>
                    <div class="model-keys">
                        ${(m.api_keys || []).slice(0, 3).map((k, ki) => `
                            <div class="key-item">
                                <span class="key-preview">${k.substring(0, 20)}...</span>
                                <label class="toggle-switch">
                                    <input type="checkbox" checked onchange="toggleKey(${idx}, ${ki})">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        `).join('')}
                        ${(m.api_keys || []).length > 3 ? `<p style="color:#888;font-size:12px;">还有 ${m.api_keys.length - 3} 个keys...</p>` : ''}
                    </div>
                    <button class="btn btn-sm btn-danger" onclick="deleteModel(${idx})"><i class="fas fa-trash"></i> 删除</button>
                </div>
            `).join('');
        }

        // 添加模型表单
        function showAddModelForm() {
            document.getElementById('add-model-form').style.display = 'block';
        }
        function hideAddModelForm() {
            document.getElementById('add-model-form').style.display = 'none';
            document.getElementById('model-form').reset();
        }

        // 提交模型
        document.getElementById('model-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('model-name').value;
            const base_url = document.getElementById('model-base-url').value;
            const keys = document.getElementById('model-keys').value.split('\n').filter(k => k.trim());
            
            const cfg = await (await fetch('/api/config')).json();
            const models = cfg.models || {};
            const newModel = { base_url, name, api_keys: keys };
            
            // 生成唯一key
            const modelKey = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
            models[modelKey] = newModel;
            
            const r = await saveConfig({ models });
            if (r.success) {
                showAlert('models-alert', '模型添加成功', 'success');
                hideAddModelForm();
                loadConfig();
            } else {
                showAlert('models-alert', r.error, 'error');
            }
        };

        // 删除模型
        async function deleteModel(idx) {
            if (!confirm('确定删除此模型？')) return;
            const cfg = await (await fetch('/api/config')).json();
            const models = cfg.models || {};
            const keys = Object.keys(models);
            if (keys[idx]) {
                delete models[keys[idx]];
                const r = await saveConfig({ models });
                if (r.success) {
                    loadConfig();
                }
            }
        }

        // 切换key状态
        async function toggleKey(mi, ki) {
            await fetch(`/api/models/${mi}/keys/${ki}/toggle`, { method: 'POST' });
        }

        // 保存设置
        document.getElementById('settings-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const pwd = document.getElementById('admin-password').value;
            const pwdConfirm = document.getElementById('admin-password-confirm').value;
            if (pwd && pwd !== pwdConfirm) {
                showAlert('settings-alert', '两次密码输入不一致', 'error');
                return;
            }
            
            const defaultKeys = document.getElementById('default-keys').value.split('\n').filter(k => k.trim());
            
            const data = {
                app_id: document.getElementById('app-id').value,
                app_secret: document.getElementById('app-secret').value,
                group_code: document.getElementById('group-code').value,
                yuanbao_user_id: document.getElementById('yuanbao-user-id').value,
                yuanbao_nick: document.getElementById('yuanbao-nick').value,
                port: parseInt(document.getElementById('port').value) || 8000,
                debug: document.getElementById('debug').value === 'true',
                default_keys: defaultKeys
            };
            
            if (pwd) data.admin_password = pwd;
            // 不传models，保留原有配置
            
            const r = await fetch('/api/config/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await r.json();
            if (result.success) {
                showAlert('settings-alert', '设置已保存', 'success');
                document.getElementById('admin-password').value = '';
                document.getElementById('admin-password-confirm').value = '';
            } else {
                showAlert('settings-alert', result.error, 'error');
            }
        };

        async function saveConfig(data) {
            const r = await fetch('/api/config/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await r.json();
        }

        // 加载日志
        async function loadLogs() {
            try {
                const r = await fetch('/api/logs');
                if (!r.ok) return;
                const logs = await r.json();
                const tbody = document.getElementById('logs-list');
                if (logs.length) {
                    tbody.innerHTML = logs.slice(0, 50).map(l => `
                        <tr>
                            <td>${new Date(l.created_at).toLocaleString()}</td>
                            <td><code>${(l.key_hash || '').substring(0, 16)}...</code></td>
                            <td>${l.model || '-'}</td>
                            <td>${l.tokens || 0}</td>
                            <td><span class="model-status ${l.success ? 'active' : 'inactive'}">${l.success ? '成功' : '失败'}</span></td>
                        </tr>
                    `).join('');
                }
            } catch(e) { console.error('loadLogs error:', e); }
        }

        function showAlert(id, msg, type) {
            const el = document.getElementById(id);
            el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => el.innerHTML = '', 3000);
        }

        function formatUptime(ts) {
            if (!ts) return '0s';
            const s = Math.floor(Date.now()/1000 - ts);
            if (s < 60) return s + 's';
            if (s < 3600) return Math.floor(s/60) + 'm';
            return Math.floor(s/3600) + 'h';
        }

        // 启动
        checkAuth();
    </script>
</body>
</html>
